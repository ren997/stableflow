spring:
  application:
    name: stableflow-backend
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stableflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.stableflow: INFO

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

stableflow:
  payment:
    order-association-mode: FIXED_ADDRESS_REFERENCE
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:5173}
  merchant:
    ownership:
      challenge-ttl: ${MERCHANT_OWNERSHIP_CHALLENGE_TTL:10m}
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-env}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    token-ttl: ${JWT_TOKEN_TTL:12h}
  solana:
    rpc-url: ${SOLANA_RPC_URL:https://api.devnet.solana.com}
    usdc-mint-address: ${SOLANA_USDC_MINT:4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU}
    connect-timeout: ${SOLANA_CONNECT_TIMEOUT:3s}
    read-timeout: ${SOLANA_READ_TIMEOUT:10s}
    retry-max-attempts: ${SOLANA_RETRY_MAX_ATTEMPTS:3}
    retry-delay: ${SOLANA_RETRY_DELAY:500ms}
    scan:
      enabled: ${SOLANA_SCAN_ENABLED:true}
      batch-size: ${SOLANA_SCAN_BATCH_SIZE:50}
      fixed-delay-ms: ${SOLANA_SCAN_FIXED_DELAY_MS:30000}
      initial-delay-ms: ${SOLANA_SCAN_INITIAL_DELAY_MS:10000}
      lock-enabled: ${SOLANA_SCAN_LOCK_ENABLED:true}
      lock-key: ${SOLANA_SCAN_LOCK_KEY:stableflow:job:payment-scan:lock}
      lock-ttl: ${SOLANA_SCAN_LOCK_TTL:5m}
  agent:
    api-key: ${AGENT_API_KEY:replace-me}
  invoice:
    expire-job:
      enabled: ${INVOICE_EXPIRE_JOB_ENABLED:true}
      fixed-delay-ms: ${INVOICE_EXPIRE_JOB_FIXED_DELAY_MS:30000}
      initial-delay-ms: ${INVOICE_EXPIRE_JOB_INITIAL_DELAY_MS:12000}
  verification:
    job:
      enabled: ${PAYMENT_VERIFY_ENABLED:true}
      batch-size: ${PAYMENT_VERIFY_BATCH_SIZE:50}
      fixed-delay-ms: ${PAYMENT_VERIFY_FIXED_DELAY_MS:30000}
      initial-delay-ms: ${PAYMENT_VERIFY_INITIAL_DELAY_MS:15000}
  reconciliation:
    job:
      enabled: ${RECONCILIATION_JOB_ENABLED:true}
      batch-size: ${RECONCILIATION_JOB_BATCH_SIZE:50}
      fixed-delay-ms: ${RECONCILIATION_JOB_FIXED_DELAY_MS:30000}
      initial-delay-ms: ${RECONCILIATION_JOB_INITIAL_DELAY_MS:20000}
  outbox:
    job:
      enabled: ${OUTBOX_JOB_ENABLED:true}
      batch-size: ${OUTBOX_JOB_BATCH_SIZE:50}
      fixed-delay-ms: ${OUTBOX_JOB_FIXED_DELAY_MS:30000}
      initial-delay-ms: ${OUTBOX_JOB_INITIAL_DELAY_MS:25000}
      lock-enabled: ${OUTBOX_JOB_LOCK_ENABLED:true}
      lock-key: ${OUTBOX_JOB_LOCK_KEY:stableflow:job:outbox-dispatch:lock}
      lock-ttl: ${OUTBOX_JOB_LOCK_TTL:5m}
      retry-delay: ${OUTBOX_JOB_RETRY_DELAY:1m}
